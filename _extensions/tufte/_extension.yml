title: tufte
author: Christopher T. Kenny
version: 1.1.0
quarto-required: ">=1.9.0"
contributes:
  formats:
    typst:
      template-partials:
        - typst-template.typ
        - typst-show.typ
        - biblio.typ
        - definitions.typ
      format-resources:
        - short_ref.csl
      date: last-modified
      date-format: "MMMM DD, YYYY"
      margin:
        left: 1in
        top: 1.5in
        bottom: 1.5in
      grid:
        margin-width: 2.75in
        gutter-width: 0.25in
      margin-geometry:
        inner:
          far: 0pt
          width: 0pt
          separation: 1in
        outer:
          far: 0.5in
      syntax-highlighting: idiomatic
